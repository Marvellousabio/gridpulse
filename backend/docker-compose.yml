services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      TELEMETRY_INTERVAL_SECONDS: 5
      AUTO_AGENT_CYCLES: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  telemetry-simulator:
    build: .
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:5000
    command: ["python", "scripts/telemetry_simulator.py", "--interval", "8", "--trigger-agent"]
    profiles:
      - demo
